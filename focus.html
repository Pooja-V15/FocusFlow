<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Focus Mode | FocusFlow</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"><link href="css/focus.css" rel="stylesheet"><link href="css/responsive.css" rel="stylesheet"></head>
<body><div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark"><i class="fa-solid fa-bolt"></i></span><span>FocusFlow</span></a><nav class="side-nav"><a href="dashboard.html"><i class="fa-solid fa-grid-2"></i>Dashboard</a><a href="planner.html"><i class="fa-solid fa-calendar-days"></i>Planner</a><a class="active" href="focus.html"><i class="fa-solid fa-stopwatch"></i>Focus</a><a href="tasks.html"><i class="fa-solid fa-list-check"></i>Tasks</a><a href="analytics.html"><i class="fa-solid fa-chart-pie"></i>Analytics</a><a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a><a href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a></nav></aside>
<main class="main-panel"><div class="topbar"><div><button class="icon-button d-lg-none mb-3" data-sidebar-toggle><i class="fa-solid fa-bars"></i></button><h1 class="fw-black">Focus Mode</h1><p class="text-muted mb-0">Pomodoro timer with ambient sessions and history.</p></div><button class="icon-button" data-theme-toggle><i class="fa-solid fa-moon"></i></button></div>
<section class="dashboard-grid"><div class="panel span-7 text-center"><div class="timer-ring"><div class="timer-face"><div><div class="timer-value" data-timer-value>25:00</div><p class="text-muted mb-0">Deep work sprint</p></div></div></div><div class="d-flex flex-wrap justify-content-center gap-2 mt-4"><button class="btn btn-ghost px-4" data-preset="25">25/5</button><button class="btn btn-ghost px-4" data-preset="50">50/10</button><button class="btn btn-ghost px-4" data-preset="15">Custom 15</button></div><div class="d-flex flex-wrap justify-content-center gap-2 mt-3"><button class="btn btn-premium px-5" data-start>Start</button><button class="btn btn-ghost px-4" data-pause>Pause</button><button class="btn btn-ghost px-4" data-reset>Reset</button></div></div>
<div class="panel span-5"><h3>Ambient Sounds</h3><div class="row g-3"><div class="col-6"><div class="sound-tile active" data-sound="Rain"><i class="fa-solid fa-cloud-rain fa-2x"></i><strong>Rain</strong></div></div><div class="col-6"><div class="sound-tile" data-sound="Forest"><i class="fa-solid fa-tree fa-2x"></i><strong>Forest</strong></div></div><div class="col-6"><div class="sound-tile" data-sound="Cafe"><i class="fa-solid fa-mug-hot fa-2x"></i><strong>Cafe</strong></div></div><div class="col-6"><div class="sound-tile" data-sound="Ocean"><i class="fa-solid fa-water fa-2x"></i><strong>Ocean</strong></div></div></div><button class="btn btn-ghost w-100 mt-3" data-demo-action="Fullscreen focus view activated."><i class="fa-solid fa-expand me-2"></i>Fullscreen</button></div>
<div class="panel span-12"><h3>Session History</h3><div class="row g-3"><div class="col-md-4"><div class="session-item"><span class="priority high"></span><div><strong>Physics</strong><div class="text-muted small">50 min - completed</div></div></div></div><div class="col-md-4"><div class="session-item"><span class="priority medium"></span><div><strong>Writing</strong><div class="text-muted small">25 min - completed</div></div></div></div><div class="col-md-4"><div class="session-item"><span class="priority low"></span><div><strong>Review</strong><div class="text-muted small">15 min - completed</div></div></div></div></div></div></section></main></div><script src="js/app.js"></script><script src="js/focus.js"></script></body></html>
