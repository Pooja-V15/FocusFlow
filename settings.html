<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Settings | FocusFlow</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"><link href="css/responsive.css" rel="stylesheet"></head>
<body><div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark"><i class="fa-solid fa-bolt"></i></span><span>FocusFlow</span></a><nav class="side-nav"><a href="dashboard.html"><i class="fa-solid fa-grid-2"></i>Dashboard</a><a href="planner.html"><i class="fa-solid fa-calendar-days"></i>Planner</a><a href="focus.html"><i class="fa-solid fa-stopwatch"></i>Focus</a><a href="tasks.html"><i class="fa-solid fa-list-check"></i>Tasks</a><a href="analytics.html"><i class="fa-solid fa-chart-pie"></i>Analytics</a><a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a><a class="active" href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a></nav></aside><main class="main-panel"><div class="topbar"><div><button class="icon-button d-lg-none mb-3" data-sidebar-toggle><i class="fa-solid fa-bars"></i></button><h1 class="fw-black">Settings</h1><p class="text-muted mb-0">Personalize FocusFlow and manage privacy.</p></div><button class="btn btn-premium px-4" data-demo-action="Settings saved.">Save settings</button></div><section class="dashboard-grid"><div class="panel span-6"><h3>Preferences</h3><label class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" data-theme-toggle> <span class="form-check-label">Dark mode</span></label><label class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked> <span class="form-check-label">Browser notifications</span></label><label class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked> <span class="form-check-label">Smart AI reminders</span></label><select class="form-select"><option>English</option><option>Hindi</option><option>Spanish</option></select></div><div class="panel span-6"><h3>Security</h3><input class="form-control mb-3" type="password" placeholder="Current password"><input class="form-control mb-3" type="password" placeholder="New password"><button class="btn btn-ghost w-100 mb-3" data-demo-action="Password changed.">Change password</button><button class="btn btn-outline-danger w-100" data-demo-action="Delete account confirmation opened.">Delete account</button></div><div class="panel span-12"><h3>Keyboard Shortcuts</h3><div class="row g-3"><div class="col-md-3"><div class="metric"><strong>N</strong><span>New task</span></div></div><div class="col-md-3"><div class="metric"><strong>F</strong><span>Start focus</span></div></div><div class="col-md-3"><div class="metric"><strong>/</strong><span>Search</span></div></div><div class="col-md-3"><div class="metric"><strong>E</strong><span>Export</span></div></div></div></div></section></main></div><script src="js/app.js"></script></body></html>
