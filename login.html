<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in | FocusFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card glass animate__animated animate__fadeIn">
      <div class="auth-art">
        <a class="brand text-white" href="index.html"><span class="brand-mark bg-white text-primary"><i class="fa-solid fa-bolt"></i></span><span>FocusFlow</span></a>
        <h1 class="display-5 fw-black mt-5">Welcome back to your calm command center.</h1>
        <p class="mt-3 opacity-75">Pick up your plan, preserve your streak, and move into your next deep-work block.</p>
      </div>
      <div class="auth-form">
        <div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-black m-0">Log in</h2><button class="icon-button" data-theme-toggle aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button></div>
        <form data-auth-form="login">
          <label class="form-label">Email</label><input class="form-control mb-3" name="email" type="email" value="alex@focusflow.app" required>
          <label class="form-label">Password</label><input class="form-control mb-3" name="password" type="password" value="FocusFlow#2026" required>
          <div class="d-flex justify-content-between align-items-center mb-4"><label class="form-check"><input class="form-check-input" type="checkbox" checked> <span class="form-check-label">Remember me</span></label><a class="text-primary" href="#" data-demo-action="Password reset link prepared.">Forgot password?</a></div>
          <button class="btn btn-premium w-100 py-3" type="submit">Continue</button>
          <button class="btn btn-ghost w-100 py-3 mt-3" type="button" data-demo-action="Google login is ready for OAuth credentials."><i class="fa-brands fa-google me-2"></i>Continue with Google</button>
        </form>
        <p class="text-muted mt-4 mb-0">New here? <a class="text-primary fw-bold" href="register.html">Create an account</a></p>
      </div>
    </section>
  </main>
  <script src="js/api.js"></script><script src="js/app.js"></script><script src="js/auth.js"></script>
</body>
</html>
