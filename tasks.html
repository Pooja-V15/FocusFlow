<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Tasks | FocusFlow</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"><link href="css/responsive.css" rel="stylesheet"></head>
<body><div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark"><i class="fa-solid fa-bolt"></i></span><span>FocusFlow</span></a><nav class="side-nav"><a href="dashboard.html"><i class="fa-solid fa-grid-2"></i>Dashboard</a><a href="planner.html"><i class="fa-solid fa-calendar-days"></i>Planner</a><a href="focus.html"><i class="fa-solid fa-stopwatch"></i>Focus</a><a class="active" href="tasks.html"><i class="fa-solid fa-list-check"></i>Tasks</a><a href="analytics.html"><i class="fa-solid fa-chart-pie"></i>Analytics</a><a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a><a href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a></nav></aside>
<main class="main-panel"><div class="topbar"><div><button class="icon-button d-lg-none mb-3" data-sidebar-toggle><i class="fa-solid fa-bars"></i></button><h1 class="fw-black">Tasks</h1><p class="text-muted mb-0">Create, filter, sort, prioritize, and celebrate completion.</p></div><button class="btn btn-premium px-4" data-demo-action="Task created with checklist and reminder."><i class="fa-solid fa-plus me-2"></i>New task</button></div>
<section class="dashboard-grid"><div class="panel span-4"><h3>Create Task</h3><input class="form-control mb-3" value="Read chapter 8"><select class="form-select mb-3"><option>High priority</option><option>Medium priority</option><option>Low priority</option></select><input class="form-control mb-3" type="date" value="2026-07-11"><button class="btn btn-premium w-100" data-demo-action="Task saved and synced.">Save task</button></div>
<div class="panel span-8"><div class="d-flex flex-wrap justify-content-between gap-2 mb-3"><div class="focus-input"><i class="fa-solid fa-search"></i><input class="form-control" placeholder="Search tasks"></div><select class="form-select w-auto"><option>Sort by deadline</option><option>Sort by priority</option><option>Sort by progress</option></select></div><div class="task-item mb-2"><input class="form-check-input" type="checkbox"><span class="priority high"></span><div class="flex-grow-1"><strong>Finish mock exam review</strong><div class="text-muted small">Exam - Due Friday - 70%</div><div class="progress mt-2"><div class="progress-bar progress-70"></div></div></div><button class="icon-button"><i class="fa-solid fa-paperclip"></i></button><button class="icon-button"><i class="fa-solid fa-pen"></i></button></div><div class="task-item mb-2"><input class="form-check-input" type="checkbox" checked><span class="priority medium"></span><div class="flex-grow-1"><strong>Organize lecture notes</strong><div class="text-muted small">Science - Completed</div><div class="progress mt-2"><div class="progress-bar progress-100"></div></div></div><button class="icon-button"><i class="fa-solid fa-trash"></i></button></div><div class="task-item"><input class="form-check-input" type="checkbox"><span class="priority low"></span><div class="flex-grow-1"><strong>Prepare flashcard deck</strong><div class="text-muted small">Memory - 35%</div><div class="progress mt-2"><div class="progress-bar progress-35"></div></div></div><button class="icon-button"><i class="fa-solid fa-ellipsis"></i></button></div></div></section></main></div><script src="js/app.js"></script></body></html>
